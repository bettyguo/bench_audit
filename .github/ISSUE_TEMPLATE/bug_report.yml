name: Bug report
description: A probe / adapter / harness is producing a wrong result.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: if this bug could change a *published verdict* on the leaderboard, please read [`SECURITY.md`](../../SECURITY.md) and consider private disclosure first.
  - type: input
    id: version
    attributes:
      label: bench-audit version
      description: Output of `bench-audit --version` or the commit SHA if running from source.
      placeholder: "0.1.0a0 or sha:fbcf236"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Exact command
      description: The command you ran (verbatim, with flags).
      placeholder: "bench-audit run --adapter swebench_verified --probe p1_gold_answer_leak --fixture-dir fixtures/swebench_verified/mini"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include the full output / stack trace.
      render: shell
    validations:
      required: true
  - type: textarea
    id: report-card
    attributes:
      label: Affected ProbeResult JSON (if any)
      description: If a `ProbeResult` JSON triggered this bug, paste it (or attach it).
      render: json
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: "I read the relevant probe spec under `docs/probes/`."
          required: false
        - label: "I checked that this is not a maintainer-outreach issue (i.e., a complaint about a *benchmark*, not about `bench-audit` itself)."
          required: true
