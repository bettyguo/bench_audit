blank_issues_enabled: false
contact_links:
  - name: Verdict-changing security issue
    url: https://github.com/jacobwu/bench-audit/security/advisories/new
    about: |
      A bug that could change a published verdict on the leaderboard — false positive,
      false negative, or invariant bypass. Disclose privately first; see SECURITY.md.
  - name: Maintainer of an audited benchmark
    url: mailto:jacob.jikun.wu@gmail.com
    about: |
      You maintain one of the benchmarks bench-audit covers and want to discuss a
      finding. Outreach goes via email + the docs/maintainer-outreach.md process,
      not the public issue tracker.
